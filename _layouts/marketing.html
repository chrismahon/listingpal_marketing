<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">
    <title>{{ page.title | default: site.title }}</title>
    {% if page.description %}<meta name="description" content="{{ page.description }}">{% endif %}
    <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}?v={{ site.time | date: '%s' }}">
    <link href="{{ "/assets/images/favicon-light.png" | relative_url }}" rel="icon" media="(prefers-color-scheme: light)">
    <link href="{{ "/assets/images/favicon-dark.png" | relative_url }}" rel="icon" media="(prefers-color-scheme: dark)">
  </head>
  <body class="bg-white text-zinc-900 antialiased">
    {{ content }}
  </body>
</html>
